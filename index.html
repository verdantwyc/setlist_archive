<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一川草色音乐博物馆 Verdant Music Museum</title>
<link href="https://fonts.loli.net/css2?family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;500;700;800&family=Noto+Serif+SC:wght@300;400;700&family=Noto+Sans+SC:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0608; --surface: #130810; --surface2: #1c0e17; --surface3: #261520;
  --border: rgba(255,255,255,0.07); --border-bright: rgba(204,83,17,0.22);
  --text: #f0e8e8; --text-dim: #a88888; --text-muted: #6a5555;
  --crimson: #930531; --ember: #CC5311; --rose: #990531;
  --crimson-dim: rgba(147,5,49,0.18); --crimson-glow: rgba(147,5,49,0.55);
  --ember-dim: rgba(204,83,17,0.14); --ember-glow: rgba(204,83,17,0.5);
  --gold: #e8a040; --gold-dim: rgba(232,160,64,0.13); --ivory: #f5e6cc;
  --font-sans: 'Noto Sans SC', sans-serif; --font-serif: 'Noto Serif SC', serif;
}
body[lang="zh-tw"] { --font-sans: 'Noto Sans TC', sans-serif; --font-serif: 'Noto Serif TC', serif; }
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; overflow-x: hidden; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

.global-nav { position: fixed; top: 16px; left: 16px; z-index: 1000; display: flex; gap: 6px; align-items: center; }
.nav-btn { background: rgba(10,6,8,0.8); border: 1px solid var(--border); color: var(--text); font-family: var(--font-sans); font-size: 16px; font-weight: 700; padding: 6px 10px; border-radius: 16px; backdrop-filter: blur(10px); transition: all 0.2s; display: flex; align-items: center; justify-content: center; cursor: pointer; min-width: 36px; height: 36px; }
.nav-btn:hover { background: var(--surface3); border-color: var(--ember); }
.nav-btn.active { background: var(--crimson-dim); border-color: var(--crimson); color: var(--ivory); }
.lang-switcher { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 2px; background: rgba(10,6,8,0.8); padding: 3px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); align-items: center; height: 36px; }
.lang-btn { background: transparent; border: none; color: var(--text-muted); font-family: var(--font-sans); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 14px; transition: all 0.2s; cursor: pointer; line-height: 1; }
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--ember); color: #fff; box-shadow: 0 0 10px var(--ember-glow); }
.view { display: none; padding-top: 70px; }
.view.active { display: block; }
#view-cover { padding-top: 0; }
#view-cover { min-height: 100vh; position: relative; overflow: hidden; display: none; flex-direction: column; }
#view-cover.active { display: flex; }
#view-cover::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
.cover-bg-glow { position: absolute; pointer-events: none; z-index: 0; border-radius: 50%; filter: blur(80px); }
.cover-bg-glow.g1 { width: 700px; height: 700px; top: -200px; left: -200px; background: radial-gradient(ellipse, var(--crimson-dim) 0%, transparent 70%); }
.cover-bg-glow.g2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: radial-gradient(ellipse, var(--ember-dim) 0%, transparent 70%); }
.cover-inner { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; padding: 80px 32px 40px; }
.cover-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
.cover-logo-wrap { display: flex; align-items: center; gap: 12px; }
.cover-logo-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--crimson), var(--ember)); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 16px var(--crimson-glow); }
.cover-logo-text { font-family: var(--font-sans); font-size: 11px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
.cover-hero { margin-bottom: 40px; }
.cover-eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--ember); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.cover-eyebrow::after { content: ''; flex: 1; max-width: 60px; height: 1px; background: linear-gradient(to right, var(--ember), transparent); }
.cover-title { font-family: var(--font-serif); font-size: clamp(36px, 8vw, 88px); font-weight: 700; line-height: 1.2; letter-spacing: -1px; background: linear-gradient(135deg, var(--ivory) 0%, var(--gold) 40%, var(--ember) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; word-break: break-word; padding-bottom: 4px; }
.cover-title-en { font-family: var(--font-sans); font-size: clamp(14px, 2vw, 18px); color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 24px; font-weight: 600; }
.cover-desc { font-size: 14px; color: var(--text-dim); line-height: 1.8; max-width: 600px; font-weight: 400; margin-bottom: 30px; }
.museum-notice { background: rgba(204,83,17,0.05); border: 1px dashed var(--border-bright); border-radius: 16px; padding: 24px; margin-bottom: 40px; }
.museum-notice h4 { font-size: 14px; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-weight: 700; }
.museum-notice p { font-size: 12px; color: var(--text-dim); line-height: 1.8; margin-bottom: 16px; }
.btn-report { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; transition: all 0.2s; cursor: pointer; }
.btn-report:hover { background: var(--crimson); border-color: var(--crimson); color: #fff; }
.cover-divider { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
.cover-divider-line { flex: 1; height: 1px; background: var(--border); }
.cover-divider-label { font-family: var(--font-sans); font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
.cover-divider-diamond { width: 6px; height: 6px; background: var(--ember); transform: rotate(45deg); box-shadow: 0 0 8px var(--ember-glow); }
.cover-index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 40px; }
.cover-series-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.28s cubic-bezier(.4,0,.2,1); position: relative; overflow: hidden; }
.cover-series-card:hover { border-color: rgba(204,83,17,0.35); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(147,5,49,0.2); }
.card-series-emoji { font-size: 32px; margin-bottom: 12px; display: block; }
.card-series-name { font-family: var(--font-sans); font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; line-height: 1.3; padding-bottom: 2px; }
.card-series-en { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; line-height: 1.4; padding-bottom: 2px; }
.card-series-meta { display: flex; justify-content: space-between; align-items: center; }
.card-series-count { font-family: var(--font-sans); font-weight: 600; font-size: 12px; color: var(--ember); }
.card-series-arrow { width: 32px; height: 32px; border-radius: 8px; background: var(--ember-dim); border: 1px solid rgba(204,83,17,0.25); display: flex; align-items: center; justify-content: center; color: var(--ember); transition: all 0.2s; }
.cover-series-card:hover .card-series-arrow { background: var(--crimson); color: #fff; box-shadow: 0 0 12px var(--crimson-glow); }
.card-series-tag { display: inline-block; background: var(--crimson-dim); border: 1px solid rgba(147,5,49,0.3); border-radius: 6px; padding: 4px 10px; font-family: var(--font-sans); font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--crimson); text-transform: uppercase; margin-bottom: 12px; }
.cover-footer { border-top: 1px solid var(--border); padding-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 40px; text-align: center; }
.cover-footer span { font-family: var(--font-sans); font-weight: 600; font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
.footer-heart { color: var(--ember); font-weight: 700; font-size: 12px; }

.artist-link { color: var(--ivory); text-decoration: underline; text-decoration-color: rgba(255,255,255,0.2); text-underline-offset: 3px; cursor: pointer; transition: all 0.2s; }
.artist-link:hover { color: var(--gold); text-decoration-color: var(--gold); }

#view-series { padding-bottom: 60px; }
.series-wrap { max-width: 820px; margin: 0 auto; padding: 20px 20px 32px; }
.inner-header { position: sticky; top: 0; z-index: 200; background: rgba(10,6,8,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0; margin-top: -10px; }
.breadcrumb { display: flex; align-items: center; gap: 8px; padding: 16px 20px; font-family: var(--font-sans); font-weight: 600; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; margin-right: 120px; }
.bc-item { cursor: pointer; transition: color 0.2s; padding: 2px 4px; border-radius: 4px; }
.bc-item:hover { color: var(--ember); }
.bc-sep { color: var(--text-muted); opacity: 0.4; font-size: 14px; }
.bc-current { color: var(--ember); }
.venue-tabs-scroll { overflow-x: auto; scrollbar-width: none; padding: 12px 20px 16px; display: flex; gap: 10px; -webkit-overflow-scrolling: touch; width: 100%; white-space: nowrap; flex-wrap: nowrap; }
.venue-tabs-scroll::-webkit-scrollbar { display: none; }
.venue-tab { flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; color: var(--text-dim); font-family: var(--font-sans); font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.venue-tab:hover { border-color: rgba(204,83,17,0.4); color: var(--text); background: rgba(255,255,255,0.06); }
.venue-tab.active { background: var(--crimson-dim); border-color: var(--crimson); color: var(--ivory); box-shadow: 0 4px 12px rgba(147,5,49,0.3); }
.series-hero { background: var(--surface); border: 1px solid var(--border-bright); border-radius: 20px; padding: 32px; margin-bottom: 32px; position: relative; overflow: hidden; }
.series-emoji-big { font-size: 56px; margin-bottom: 16px; display: block; }
.series-hero-title { font-family: var(--font-sans); font-size: 36px; font-weight: 800; line-height: 1.3; padding-bottom: 4px; margin-bottom: 8px; }
.series-hero-en { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px; line-height: 1.4; padding-bottom: 2px; }
.series-hero-desc { font-size: 15px; color: var(--text-dim); line-height: 1.7; max-width: 500px; }
.venues-section-label { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px; display: flex; align-items: center; gap: 12px; }
.venues-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.venues-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.venue-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; cursor: pointer; transition: all 0.25s; position: relative; }
.venue-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent; border-radius: 4px 0 0 4px; transition: background 0.25s; }
.venue-card:hover { border-color: rgba(204,83,17,0.3); transform: translateX(4px); background: var(--surface2); }
.venue-card:hover::before { background: linear-gradient(to bottom, var(--ember), var(--crimson)); }
.venue-card-name { font-family: var(--font-sans); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.3; padding-bottom: 2px; }
.venue-card-footer { display: flex; justify-content: space-between; align-items: center; }
.venue-card-tracks { font-family: var(--font-sans); font-weight: 700; font-size: 11px; color: var(--ember); }
.venue-card-go { width: 28px; height: 28px; border-radius: 6px; background: var(--ember-dim); border: 1px solid rgba(204,83,17,0.25); display: flex; align-items: center; justify-content: center; color: var(--ember); font-size: 14px; }
.venue-card-meta { font-family: var(--font-sans); font-weight: 500; font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.venue-meta-row { display: flex; align-items: center; gap: 7px; }
.venue-meta-icon { font-size: 11px; flex-shrink: 0; opacity: 0.65; line-height: 1; }
.venue-meta-date { font-weight: 600; color: var(--text); font-size: 12px; letter-spacing: 0.3px; }
.venue-meta-place { color: var(--text-dim); font-size: 12px; }
.status-tag { display: inline-flex; align-items: center; gap: 6px; border-radius: 6px; padding: 4px 10px; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; font-family: var(--font-sans); }
.status-live { background: rgba(147,5,49,0.22); border: 1px solid rgba(220,50,80,0.5); color: #ff8099; }
.status-coming { background: rgba(232,160,64,0.15); border: 1px solid rgba(232,160,64,0.45); color: var(--gold); }
.status-archive { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: var(--text-muted); }
.status-dot { width: 6px; height: 6px; background: #ff4466; border-radius: 50%; box-shadow: 0 0 5px #ff4466; animation: pulse 1.4s ease infinite; flex-shrink: 0; }

#view-program { padding-bottom: 80px; }
.prog-wrap { max-width: 780px; margin: 0 auto; padding: 20px 20px 32px; }
.player-device { background: var(--surface); border-radius: 24px; border: 1px solid var(--border-bright); padding: 30px; margin-bottom: 24px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 40px rgba(147,5,49,0.07); }
.device-top { display: flex; align-items: flex-start; gap: 24px; position: relative; z-index: 1; }
.vinyl-wrap { flex-shrink: 0; position: relative; }
.vinyl { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(#1a0510 0deg,#2d0a1a 45deg,#400d22 90deg,#1a0510 135deg,#0d0208 180deg,#1a0510 225deg,#2d0a1a 270deg,#0d0208 315deg,#1a0510 360deg); box-shadow: 0 0 0 2px rgba(147,5,49,0.5), 0 0 20px rgba(147,5,49,0.2), 0 8px 24px rgba(0,0,0,0.7); animation: spin 10s linear infinite; position: relative; }
.vinyl::after { content: ''; position: absolute; inset: 36px; border-radius: 50%; background: radial-gradient(circle, var(--ember) 0%, var(--crimson) 40%, #1a0510 65%); }
@keyframes spin { to { transform: rotate(360deg); } }
.needle { position: absolute; width: 4px; height: 50px; background: linear-gradient(to bottom, var(--ember), transparent); top: -10px; right: -8px; transform-origin: top center; transform: rotate(30deg); opacity: 1; }
.device-info { flex: 1; min-width: 0; }
.device-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--crimson-dim); border: 1px solid rgba(147,5,49,0.4); border-radius: 20px; padding: 4px 12px 4px 8px; margin-bottom: 12px; }
.device-badge .dot { width: 8px; height: 8px; background: var(--crimson); border-radius: 50%; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.device-badge span { font-family: var(--font-sans); font-weight: 700; font-size: 11px; color: var(--crimson); letter-spacing: 1px; text-transform: uppercase; line-height: 1.4; }
.concert-name { font-family: var(--font-sans); font-size: 26px; font-weight: 800; line-height: 1.3; padding-bottom: 2px; }
.concert-name .en { font-size: 12px; font-weight: 600; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: 4px; font-family: var(--font-sans); line-height: 1.4; }
.device-meta { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.meta-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: var(--font-sans); font-weight: 600; font-size: 11px; color: var(--text-dim); }
.meta-chip strong { color: var(--text); font-size: 12px; }
.concert-note { margin-top: 12px; padding: 10px 12px; border-radius: 8px; background: var(--surface2); border-left: 3px solid var(--ember); color: var(--text-dim); font-size: 12px; line-height: 1.6; display: none; }
.concert-note:not(:empty) { display: block; }
.concert-note span { color: var(--ember); font-weight: 800; margin-right: 8px; }
.platform-legend { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 24px; }
.legend-title { font-size: 11px; color: var(--text-muted); font-family: var(--font-sans); font-weight: 700; }
.legend-items { display: flex; gap: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); font-weight: 600; }
.legend-icon { display: inline-flex; justify-content: center; align-items: center; width: 22px; height: 22px; border-radius: 6px; font-size: 12px; }
.sb-spotify { background: rgba(30,215,96,0.15); color: #1ed760; border: 1px solid rgba(30,215,96,0.25); }
.sb-netease { background: rgba(220,60,60,0.15); color: #f07070; border: 1px solid rgba(220,60,60,0.25); }
.sb-qq { background: rgba(232,160,64,0.15); color: #e8a040; border: 1px solid rgba(232,160,64,0.25); }
.section-header { display: flex; align-items: center; gap: 14px; margin: 32px 0 16px; }
.section-pill { border: 1px solid var(--border-bright); border-radius: 20px; padding: 6px 16px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.section-pill.tracks-pill { color: var(--ember); background: var(--ember-dim); }
.section-pill.encore-pill { color: var(--gold); background: var(--gold-dim); }
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-num { font-size: 11px; font-weight: 600; color: var(--text-muted); }
.track-grid { display: flex; flex-direction: column; gap: 10px; }
.track-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: grid; grid-template-columns: 42px 1fr auto; gap: 0 14px; align-items: center; transition: all 0.25s; }
.track-card:hover { border-color: rgba(204,83,17,0.35); background: var(--surface2); transform: translateX(4px); box-shadow: -4px 0 0 var(--ember); }
.track-num-circle { width: 42px; height: 42px; border-radius: 12px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-muted); flex-shrink: 0; font-family: var(--font-sans); font-weight: 700; }
.track-info { min-width: 0; }
.track-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
.track-name { font-size: 16px; font-weight: 700; color: var(--text); white-space: normal; overflow: visible; word-break: break-word; line-height: 1.4; }
.track-name-link { cursor: pointer; border-bottom: 1px solid rgba(204,83,17,0.45); transition: color 0.2s, border-color 0.2s; }
.track-name-link:hover { color: var(--gold); border-color: var(--gold); }
.genre-tag { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; flex-shrink: 0; letter-spacing: 1px; }
.g-original { background: rgba(204,83,17,0.12); color: var(--ember); }
.g-cover { background: rgba(147,5,49,0.14); color: #ff6090; }
.g-orig-singer { background: rgba(232,160,64,0.12); color: var(--gold); }
.g-bgm { background: rgba(150,150,150,0.12); color: #a8a8a8; }
.track-credits-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
.credit-item { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
.credit-item .lbl { font-size: 10px; color: var(--text-muted); margin-right: 6px; font-weight: 700; }
.stream-btns-row { display: flex; gap: 8px; align-items: center; }
.stream-btn-icon { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 9px; font-size: 14px; font-weight: 800; text-decoration: none; transition: transform 0.2s, filter 0.2s; }
.stream-btn-icon:hover { transform: scale(1.1); filter: brightness(1.2); }

.filter-tabs { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.filter-tab { background: none; border: none; padding: 8px 16px; color: var(--text-muted); font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
.filter-tab:hover { background: rgba(255,255,255,0.05); }
.filter-tab.active { background: var(--surface2); color: var(--ember); border: 1px solid var(--border); }
.public-lib-search { width: 100%; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; margin-bottom: 24px; outline: none; transition: border-color 0.2s; }
.public-lib-search:focus { border-color: var(--ember); }
.lib-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; transition: all 0.2s; }
.lib-card:hover { border-color: rgba(204,83,17,0.3); background: var(--surface2); }
.lib-card-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.lib-card-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.lib-card-meta { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; line-height: 1.4; }
.lib-card-body { margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); display: none; }
.lib-card.expanded .lib-card-body { display: block; }
.lib-venue-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; margin-bottom: 20px; }
.lib-venue-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; background: var(--surface3); padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.lib-venue-item:hover { color: var(--ember); background: rgba(204,83,17,0.1); }
.lib-load-more { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 22px 0 8px; }
.lib-count-note { text-align: center; color: var(--text-muted); font-size: 12px; font-weight: 700; }

.artist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; transition: all 0.2s; }
.artist-card-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.artist-name { font-size: 22px; font-weight: 800; color: var(--ivory); }
.artist-name-en { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
.artist-body { margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--border); display: none; }
.artist-card.expanded .artist-body { display: block; }
.artist-intro { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; background: var(--surface2); padding: 12px; border-radius: 8px; white-space: pre-wrap; }
.artist-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.artist-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.artist-tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.artist-tag { background: var(--surface3); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 11px; color: var(--text); line-height: 1.4; }
.modal-tab { background: none; border: none; padding: 10px 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; font-weight: 700; }
.modal-tab.active { color: var(--ember); border-bottom: 2px solid var(--ember); }

.view-busy { position: fixed; inset: 0; z-index: 900; display: none; align-items: center; justify-content: center; pointer-events: none; background: rgba(10,6,8,0.18); backdrop-filter: blur(2px); }
body.is-busy .view-busy { display: flex; }
.view-busy-inner { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; background: rgba(19,8,16,0.92); border: 1px solid var(--border-bright); color: var(--text-dim); font-size: 12px; font-weight: 700; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
.view-busy-spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(204,83,17,0.22); border-top-color: var(--ember); animation: spin 0.8s linear infinite; }
@media(max-width: 600px) {
  .track-name { max-width: none; }
  .concert-name { font-size: 24px; }
  .vinyl { width: 90px; height: 90px; }
  .vinyl::after { inset: 32px; }}
</style>
</head>
<body>
<div class="view-busy"><div class="view-busy-inner"><span class="view-busy-spinner"></span><span id="view-busy-text">载入中…</span></div></div>
<div class="global-nav">
  <button class="nav-btn active" onclick="switchMainView('view-cover')" id="nav-home" title="首页 Home">🏛</button>
  <button class="nav-btn" onclick="switchMainView('view-track-lib')" id="nav-tracks" title="曲库 Tracks">🎵</button>
  <button class="nav-btn" onclick="switchMainView('view-artist-lib')" id="nav-artists" title="创作者 Creators">👤</button>
</div>
<div class="lang-switcher">
  <button class="lang-btn active" onclick="setLang('zh_cn')">简</button>
  <button class="lang-btn" onclick="setLang('zh_tw')">繁</button>
  <button class="lang-btn" onclick="setLang('en')">En</button>
</div>

<!-- ══════════ VIEWS ══════════ -->
<div id="view-cover" class="view active">
  <div class="cover-bg-glow g1"></div><div class="cover-bg-glow g2"></div>
  <div class="cover-inner">
    <div class="cover-topbar">
      <div class="cover-logo-wrap">
        <div class="cover-logo-icon">🎵</div>
        <div>
          <div style="font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ivory);line-height:1.4;" id="cv-logo-name"></div>
          <div class="cover-logo-text" id="cv-logo-en">MUSIC MUSEUM</div>
        </div>
      </div>
      <div id="cv-year"></div>
    </div>
    <div class="cover-hero">
      <div class="cover-eyebrow" id="cv-eyebrow">Program Collection</div>
      <div class="cover-title" id="cv-title"></div>
      <div class="cover-title-en" id="cv-title-en">MUSIC MUSEUM</div>
      <div class="cover-desc" id="cv-desc"></div>
    </div>
    <div class="museum-notice">
      <h4>💡 <span id="notice-title">观展指南 &amp; 歌单说明</span></h4>
      <p id="notice-desc"></p>
      <a href="https://wj.qq.com/s2/26472705/ae0c/" target="_blank" class="btn-report" id="btn-report">✉️ 立即反馈</a>
    </div>
    <div class="cover-divider">
      <div class="cover-divider-diamond"></div>
      <div class="cover-divider-label" id="cv-idx-label">演出系列索引</div>
      <div class="cover-divider-line"></div>
    </div>
    <div class="cover-index-grid" id="coverIndexGrid"></div>
    <div class="cover-footer">
      <div class="footer-heart">Verdant made with ❤️</div>
      <span id="cv-footer-tag">音乐典藏 · Music Archive © 2026</span>
    </div>
  </div>
</div>

<div id="view-series" class="view">
  <div class="inner-header">
    <div class="breadcrumb" id="seriesBreadcrumb"></div>
    <div class="venue-tabs-scroll" id="venueTabs"></div>
  </div>
  <div class="series-wrap">
    <div class="series-hero" id="seriesHero"></div>
    <div class="venues-section-label">
      <span id="sv-idx-label">场次索引</span>
    </div>
    <div class="venues-grid" id="venuesGrid"></div>
  </div>
</div>

<div id="view-program" class="view">
  <div class="inner-header">
    <div class="breadcrumb" id="programBreadcrumb"></div>
    <div class="venue-tabs-scroll" id="programVenueTabs"></div>
  </div>
  <div class="prog-wrap">
    <div class="player-device">
      <div class="device-top">
        <div class="vinyl-wrap"><div class="vinyl"></div><div class="needle"></div></div>
        <div class="device-info">
          <div id="devBadge" style="margin-bottom:12px;"></div>
          <h1 class="concert-name" id="devName">—</h1>
          <div class="device-meta" id="devMeta"></div>
          <div class="concert-note" id="devNote"></div>
        </div>
      </div>
    </div>
    <div class="platform-legend" id="platformLegend"></div>
    <div class="section-header" id="header-tracks">
      <div class="section-pill tracks-pill" id="lbl-tracks">演出曲目 · Main Set</div>
      <div class="section-line"></div>
      <span class="section-num" id="trackscount"></span>
    </div>
    <div class="track-grid" id="gridTracks"></div>
    <div class="section-header" id="header-encore" style="margin-top:30px">
      <div class="section-pill encore-pill" id="lbl-encore">安可曲 · Encore</div>
      <div class="section-line"></div>
    </div>
    <div class="track-grid" id="gridEncore"></div>
  </div>
</div>

<div id="view-track-lib" class="view">
  <div class="prog-wrap">
    <h1 class="concert-name" style="margin-bottom:24px;" id="pub-lib-title">🎵 音乐曲库</h1>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px;">
      <input type="text" class="public-lib-search" id="pub-lib-search" placeholder="输入歌名搜索..." oninput="renderPublicTrackLib()" style="margin-bottom:0;flex:1;min-width:200px;">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setTrackLibFilter('all',this)" id="flt-all">全部曲目</button>
      <button class="filter-tab" onclick="setTrackLibFilter('original',this)" id="flt-original">原创专区</button>
    </div>
    <div id="pub-lib-container"></div>
  </div>
</div>

<div id="view-artist-lib" class="view">
  <div class="prog-wrap">
    <h1 class="concert-name" style="margin-bottom:24px;" id="pub-art-title">👤 创作者</h1>
    <input type="text" class="public-lib-search" id="pub-art-search" placeholder="输入人员名称搜索..." oninput="renderPublicArtistLib()">
    <div id="pub-art-container"></div>
  </div>
</div>


<!--
Data is loaded from the external JSON files in data/.
If the page does not render content, check that data/museum.json, data/series.json,
data/tracks.json, data/artists.json, and data/setlists/{venueId}.json are reachable.
-->
<script src="main.js"></script>
</body>
</html>
